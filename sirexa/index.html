<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sirexa (Web Edition)</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
    <div class="layout">
        <div id="credit" class="credit-popover" popover>
            <ul>
                <li><img src="./assets/sirexa.png" alt="sirexa pepw emote" /> and character by <a href="https://twitch.tv/levitatingkitty" target="_blank">levitatingkitty</a></li>
                <li>made by <a href="https://twitch.tv/justpyrrha" target="_blank">py</a> with <span style="color: #cd5c5c">❤</span> (and no ai lol)</li>
            </ul>
            <div class="src-center">
                <a class="src-link" href="https://github.com/JustPyrrha/pyrrha.gay/tree/main/sirexa" target="_blank">open source</a>
            </div>
        </div>
        <div class="sidebar">
            <div class="sidebar-content">
                <div class="sidebar-item">
                    <a href="https://twitch.tv/levitatingkitty" target="_blank">
                        <img src="./assets/sirexa.png" alt="sirexa pepw emote" />
                    </a>
                </div>
                <button popovertarget="credit" class="sidebar-item credit-btn">
                    <!-- feather icons help-circle -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-help-circle"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </button>
            </div>
        </div>
        <div class="content">
            <header>
                <h1 class="wordmark">Sirexa</h1>
            </header>
            <div class="content-main">
                <div id="msgSpacer" class="content-main__spacer" hidden></div>
                <main>
                    <div class="prompt">
                        <div class="prompt-content">
                            <textarea rows="1" class="prompt-input" placeholder="Ask Sirexa anything"></textarea>
                            <button onclick="handle_submit(prompt_input);" class="prompt-submit prompt-submit-hidden">
                                <!-- feather icons arrow-up -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-up"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                            </button>
                        </div>
                    </div>
                </main>
                <div id="bottom_spacer" class="content-main__spacer" hidden></div>
                <footer class="disclaimer">
                    By messaging Sirexa, an AI personal companion, you agree to our <span class="fake-link">Terms</span> and have read our <span class="fake-link">Privacy Policy</span>.
                </footer>
            </div>
        </div>
    </div>
    <script src="./index.js"></script>
    </body>
</html>
